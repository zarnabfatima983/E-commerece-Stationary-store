<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Stationery Shop</title>
<link rel="stylesheet" href="../cssFile/globalStyles.css">
<script defer src="../jsFile/jsFunctions.js"></script>
</head>
<body>

<!-- ================= NAVBAR ================= -->
<nav class="navbar">
<div class="logo">&#128196; Stationery Shop</div>
<ul class="nav-links">
<li><a href="../index.html">Home</a></li>
<li><a href="products.html">Products</a></li>
<li><a href="cart.html">Cart</a></li>
<li><a href="signup.html">Signup</a></li>
<li><a href="faq.html">FAQ</a></li>
</ul>
<div class="nav-right">
<button onclick="toggleTheme()">&#127769;</button>
</div>
</nav>

<!-- ================= LOGIN HERO ================= -->
<div class="auth-hero">
<h1>&#128274; Welcome Back</h1>
<p>Sign in to manage your orders and access the dashboard</p>
</div>

<!-- ================= LOGIN FORM ================= -->
<div class="auth-box">

<div class="auth-tabs">
<a href="login.html" class="auth-tab active">Login</a>
<a href="signup.html" class="auth-tab">Signup</a>
</div>

<h2>Sign In</h2>

<div class="input-group">
<label>Email Address</label>
<input type="email" id="loginEmail" placeholder="Enter your email">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="loginPassword" placeholder="Enter your password">
</div>

<div class="auth-options">
<label><input type="checkbox"> Remember me</label>
<a href="#">Forgot Password?</a>
</div>

<button class="auth-btn" onclick="loginUser()">&#128274; Login</button>

<div class="auth-divider"><span>OR</span></div>

<button class="auth-btn-outline" onclick="loginAsAdmin()">&#128200; Login as Admin (Dashboard)</button>

<p class="form-link">No account? <a href="signup.html">Create one here</a></p>

</div>

<script>
function loginUser(){
  const email = document.getElementById("loginEmail").value.trim();
  const pass  = document.getElementById("loginPassword").value.trim();
  if(!email || !pass){ alert("Please fill in all fields."); return; }
  const users = JSON.parse(localStorage.getItem("users")) || [];
  const found = users.find(u => u.email === email && u.password === pass);
  if(found){
    localStorage.setItem("loggedInUser", JSON.stringify(found));
    alert("Welcome back, " + found.name + "!");
    window.location.href = "../index.html";
  } else {
    alert("Invalid email or password. Please try again.");
  }
}
function loginAsAdmin(){
  localStorage.setItem("loggedInUser", JSON.stringify({name:"Admin", role:"admin"}));
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
